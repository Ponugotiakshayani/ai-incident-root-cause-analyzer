global:
  scrape_interval: 5s
  scrape_timeout: 5s
  evaluation_interval: 1m

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: "service-a"
    static_configs:
      - targets: ["service-a:8000"]

  - job_name: "service-b"
    static_configs:
      - targets: ["service-b:8001"]

  - job_name: "rca-service"
    static_configs:
      - targets: ["rca-service:8002"]